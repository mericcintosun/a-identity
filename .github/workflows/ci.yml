name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        run: npm install

      - name: Install backend deps
        run: npm install --prefix mcp

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build backend + unit tests
        run: npm test --prefix mcp

      - name: Full E2E flow (start backend, drive the whole product, tear down)
        run: |
          node mcp/dist/http.js &
          BACKEND=$!
          for i in $(seq 1 30); do curl -sf http://localhost:3399/health >/dev/null && break; sleep 1; done
          npm run e2e --prefix mcp
          kill $BACKEND 2>/dev/null || true

      - name: Build frontend
        run: npx vite build
